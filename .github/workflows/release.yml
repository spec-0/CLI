# Publishes @spec0/cli to npm + creates a GitHub release when a `vX.Y.Z` tag is pushed.
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN required.
# See RELEASE.md for the full release policy.

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: cli-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create GitHub release
      id-token: write # npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      # Trusted publishing requires npm >= 11.5.1; Node 20's bundled npm lags behind.
      - name: Upgrade npm CLI
        run: npm install -g npm@latest

      - name: Assert tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Releasing v$PKG"

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run test:smoke

      - name: Publish to npm (trusted publisher, provenance auto-enabled)
        run: npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
