# Build + test @spec0/cli on every PR.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: cli-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (generates types, then tsc)
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Smoke (help + --output=json shape)
        run: npm run test:smoke
