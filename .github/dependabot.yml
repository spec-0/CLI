version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      # Coalesce minor + patch updates into one PR per ecosystem.
      npm-minor-and-patch:
        update-types: [minor, patch]
    ignore:
      # Pin to ESM-friendly chalk; chalk@5 onwards is ESM-only and that's
      # what we use. Skip suggestion noise to roll back to chalk@4.
      - dependency-name: chalk
        versions: ["<5"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    groups:
      gha-minor-and-patch:
        update-types: [minor, patch]
