openapi: 3.0.3
info:
  title: Spec0 CLI Workspace API
  version: 1.0.0
  description: |
    Org API key authenticated endpoints used by `spec0` CLI.
    This spec is design-first and drives generated controller interfaces/models in backend.

paths:
  /api-management/cli/v1/mocks:
    get:
      tags:
        - cli-workspace
      operationId: listMocks
      summary: List mock servers for an org
      parameters:
        - name: X-Org-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Mock servers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MockItem"
    post:
      tags:
        - cli-workspace
      operationId: createMock
      summary: Create or fetch default mock server for API
      parameters:
        - name: X-Org-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMockRequest"
      responses:
        "200":
          description: Existing or newly created mock server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMockResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"

  /api-management/cli/v1/spectral-ruleset:
    get:
      tags:
        - cli-workspace
      operationId: getSpectralRuleset
      summary: Get org Spectral ruleset
      parameters:
        - name: X-Org-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Ruleset content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpectralRulesetResponse"
    put:
      tags:
        - cli-workspace
      operationId: putSpectralRuleset
      summary: Save org Spectral ruleset
      parameters:
        - name: X-Org-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutSpectralRulesetRequest"
      responses:
        "200":
          description: Status response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "402":
          description: Plan restriction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"

  /api-management/cli/v1/publish:
    post:
      tags:
        - cli-workspace
      operationId: publishCliSpec
      summary: Publish OpenAPI spec from CLI
      description: |
        Publishes a design-time API spec for CLI workflows.
        - If `apiId` is provided: update that API metadata/spec and publish version.
        - If `apiId` is omitted: create a new API using `name` + `team` and publish version.
      parameters:
        - name: X-Org-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CliPublishRequest"
      responses:
        "200":
          description: Publish result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliPublishResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"

components:
  schemas:
    CreateMockRequest:
      type: object
      properties:
        apiId:
          type: string
          format: uuid
        apiName:
          type: string
      description: Provide either `apiId` or `apiName`.

    MockItem:
      type: object
      properties:
        mockServerId:
          type: string
          format: uuid
        apiId:
          type: string
          format: uuid
        apiName:
          type: string
        name:
          type: string
        mockBaseUrl:
          type: string

    CreateMockResponse:
      allOf:
        - $ref: "#/components/schemas/MockItem"
        - type: object
          properties:
            created:
              type: boolean
            apiKey:
              type: string
              nullable: true
              description: One-time API key shown only when mock is newly created.

    SpectralRulesetResponse:
      type: object
      properties:
        rulesetYaml:
          type: string

    PutSpectralRulesetRequest:
      type: object
      properties:
        rulesetYaml:
          type: string

    StatusResponse:
      type: object
      properties:
        status:
          type: string

    CliPublishRequest:
      type: object
      required:
        - openapiSpec
      properties:
        apiId:
          type: string
          format: uuid
          description: Existing API id (backward compat). Prefer slug-based upsert via name.
        name:
          type: string
          description: |
            API name (kebab-case). If omitted, derived from the basename of specFilePath.
            Never derived from info.title — title is display metadata, not the API identity.
          pattern: '^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$'
        team:
          type: string
          description: |
            Team UUID or slug. If omitted, API lands in org's "Unassigned APIs" team.
          pattern: '^([0-9a-fA-F-]{36}|[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)$'
        version:
          type: string
          description: |
            Semver version tag. If omitted, extracted from info.version in the spec.
        openapiSpec:
          type: string
          description: OpenAPI document content (YAML or JSON).
        gitSha:
          type: string
          description: Git commit SHA. Used as idempotency key — same SHA = no-op.
        githubRepo:
          type: string
        githubBranch:
          type: string
        specFilePath:
          type: string
          description: Relative path to spec file. Used to derive API name if name is omitted.
        semver:
          type: boolean
          default: false
          description: |
            Auto-compute next version via oasdiff diff classification
            (PATCH / NON_BREAKING / BREAKING).

    CliPublishResponse:
      type: object
      properties:
        apiId:
          type: string
          format: uuid
        specRecordId:
          type: string
          format: uuid
        version:
          type: string
        created:
          type: boolean
          description: True if a new API entity was created.
        versionCreated:
          type: boolean
          description: True if a new version snapshot was created.
        noChanges:
          type: boolean
          description: True if git SHA matched — no changes detected, no-op.
        versionUnchanged:
          type: boolean
          description: Spec changed but version tag is the same as the stored HEAD.
        versionUnchangedHint:
          type: string
          description: Human-readable hint for versionUnchanged case.
        apiName:
          type: string
          description: Resolved API name.
        teamName:
          type: string
          description: Resolved team name.
        orgSlug:
          type: string
          description: Organisation slug.
        registryUrl:
          type: string
          description: Canonical registry path (e.g. /registry/{orgSlug}/{apiName}).

    Problem:
      type: object
      properties:
        status:
          type: integer
        title:
          type: string
        detail:
          type: string
